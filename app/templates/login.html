{% extends 'base.html' %}
{% block content %}
<div class="max-w-4xl mx-auto bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden grid grid-cols-1 md:grid-cols-2 min-h-[60h]">
    
    <div class="bg-indigo-600 p-8 text-white flex flex-col justify-between">
        <div>
            <h2 class="text-2xl font-bold tracking-tight">Meet up. Split costs. Group up.</h2>
            <p class="text-indigo-100 text-sm mt-2">The closed-loop micro-network built exclusively for coordinating turf bookings, sharing rides, and finding project squads on campus.</p>
        </div>
        <div class="text-xs text-indigo-200">
            &copy; 2026 CampusConnect Infrastructure.
        </div>
    </div>

    <div class="p-8 flex flex-col justify-center">
        <div class="flex gap-4 mb-6 border-b border-slate-100 pb-3 text-sm font-semibold">
            <button onclick="toggleForm('login')" id="tab-login" class="text-indigo-600 border-b-2 border-indigo-600 pb-3 -mb-3.5">Sign In</button>
            <button onclick="toggleForm('signup')" id="tab-signup" class="text-slate-400 hover:text-slate-600 pb-3">Create Student Account</button>
        </div>

        <form id="form-login" action="/login" method="POST" class="space-y-4">
            <input type="hidden" name="action" value="login">
            <div>
                <label class="block text-xs font-semibold text-slate-600 mb-1">Personal Gmail ID</label>
                <input type="email" name="email" required class="w-full px-3 py-2 border border-slate-200 rounded-xl text-sm focus:outline-none">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-600 mb-1">Password</label>
                <input type="password" name="password" required class="w-full px-3 py-2 border border-slate-200 rounded-xl text-sm focus:outline-none">
            </div>
            <button type="submit" class="w-full py-2.5 bg-indigo-600 text-white rounded-xl text-sm font-medium hover:bg-indigo-700 transition shadow-sm shadow-indigo-100">Sign In</button>
        </form>

        <form id="form-signup" action="/login" method="POST" enctype="multipart/form-data" class="hidden space-y-4">
            <input type="hidden" name="action" value="signup">
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">Gmail ID</label>
                    <input type="email" name="email" required class="w-full px-3 py-2 border border-slate-200 rounded-xl text-sm focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">Roll Number</label>
                    <input type="text" name="roll_number" placeholder="AM.EN.U4..." required class="w-full px-3 py-2 border border-slate-200 rounded-xl text-sm focus:outline-none">
                </div>
            </div>
            <div class="grid grid-cols-3 gap-2">
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">Age</label>
                    <input type="number" name="age" min="16" max="30" required class="w-full px-3 py-2 border border-slate-200 rounded-xl text-sm focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">Gender</label>
                    <select name="gender" required class="w-full px-3 py-2 border border-slate-200 rounded-xl text-sm focus:outline-none bg-white">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">Password</label>
                    <input type="password" name="password" required class="w-full px-3 py-2 border border-slate-200 rounded-xl text-sm focus:outline-none">
                </div>
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-600 mb-1">Avatar Picture <span class="text-slate-400 font-normal">(Optional)</span></label>
                <input type="file" name="profile_pic" accept="image/*" class="w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-semibold file:bg-indigo-50 file:text-indigo-600 hover:file:bg-indigo-100">
            </div>
            
            <div>
                <label class="block text-xs font-semibold text-slate-600 mb-2">Select Core Interests</label>
                <div class="grid grid-cols-2 gap-2 text-xs text-slate-700">
                    <label class="flex items-center gap-2"><input type="checkbox" name="interests" value="coding" class="rounded border-slate-300 text-indigo-600"> 💻 Coding / Hackathons</label>
                    <label class="flex items-center gap-2"><input type="checkbox" name="interests" value="going out" class="rounded border-slate-300 text-indigo-600"> 🍕 Going Out / Food</label>
                    <label class="flex items-center gap-2"><input type="checkbox" name="interests" value="rides" class="rounded border-slate-300 text-indigo-600"> 🚗 Joined Rides</label>
                    <label class="flex items-center gap-2"><input type="checkbox" name="interests" value="sports" class="rounded border-slate-300 text-indigo-600"> ⚽ Turf / Sports</label>
                </div>
            </div>

            <button type="submit" class="w-full py-2.5 bg-indigo-600 text-white rounded-xl text-sm font-medium hover:bg-indigo-700 transition">Complete Registration</button>
        </form>
    </div>
</div>

<script>
    function toggleForm(target) {
        const loginForm = document.getElementById('form-login');
        const signupForm = document.getElementById('form-signup');
        const tabLogin = document.getElementById('tab-login');
        const tabSignup = document.getElementById('tab-signup');

        if(target === 'login') {
            loginForm.classList.remove('hidden');
            signupForm.classList.add('hidden');
            tabLogin.className = "text-indigo-600 border-b-2 border-indigo-600 pb-3 -mb-3.5";
            tabSignup.className = "text-slate-400 hover:text-slate-600 pb-3";
        } else {
            loginForm.classList.add('hidden');
            signupForm.classList.remove('hidden');
            tabSignup.className = "text-indigo-600 border-b-2 border-indigo-600 pb-3 -mb-3.5";
            tabLogin.className = "text-slate-400 hover:text-slate-600 pb-3";
        }
    }
</script>
{% endblock %}
