{% extends 'base.html' %}
{% block content %}
<div class="max-w-4xl mx-auto bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden grid grid-cols-1 md:grid-cols-2 min-h-[60vh] mt-6">
    
    <div class="bg-indigo-600 p-8 text-white flex flex-col justify-between">
        <div>
            <h2 class="text-2xl font-bold tracking-tight">Meet up. Split costs. Group up.</h2>
            <p class="text-indigo-100 text-sm mt-2">The closed-loop micro-network built exclusively for coordinating turf bookings, sharing rides, and finding project squads on campus.</p>
        </div>
        <div class="text-xs text-indigo-200">
            &copy; 2026 CampusConnect Infrastructure. All rights reserved.
        </div>
    </div>

    <div class="p-8 flex flex-col justify-center">
        <div class="flex gap-4 mb-6 border-b border-slate-100 pb-3 text-sm font-semibold">
            <button onclick="toggleForm('login')" id="tab-login" type="button" class="text-indigo-600 border-b-2 border-indigo-600 pb-3 -mb-3.5 focus:outline-none">Sign In</button>
            <button onclick="toggleForm('signup')" id="tab-signup" type="button" class="text-slate-400 hover:text-slate-600 pb-3 focus:outline-none">Create Student Account</button>
        </div>

        <form id="form-login" action="/login" method="POST" class="space-y-4">
            <input type="hidden" name="action" value="login">
            <div>
                <label class="block text-xs font-semibold text-slate-600 mb-1">Personal Gmail ID</label>
                <input type="email" name="email" required placeholder="name@gmail.com" class="w-full px-3 py-2 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-indigo-500">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-600 mb-1">Password</label>
                <input type="password" name="password" required placeholder="••••••••" class="w-full px-3 py-2 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-indigo-500">
            </div>
            <button type="submit" class="w-full py-2.5 bg-indigo-600 text-white rounded-xl text-sm font-medium hover:bg-indigo-700 transition shadow-sm shadow-indigo-100">Sign In</button>
        </form>

        <form id="form-signup" action="/login" method="POST" class="hidden space-y-4">
            <input type="hidden" name="action" value="signup">
            
            <div>
                <label class="block text-xs font-semibold text-slate-600 mb-1">Full Name</label>
                <input type="text" name="name" required placeholder="Sidharth" class="w-full px-3 py-2 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-indigo-500">
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">Gmail ID</label>
                    <input type="email" name="email" required placeholder="name@gmail.com" class="w-full px-3 py-2 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">Roll Number</label>
                    <input type="text" name="roll_number" placeholder="AM.EN.U4CSE..." required class="w-full px-3 py-2 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-indigo-500">
                </div>
            </div>

            <div class="grid grid-cols-3 gap-2">
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">Age</label>
                    <input type="number" name="age" min="16" max="30" required placeholder="20" class="w-full px-3 py-2 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">Gender</label>
                    <select name="gender" required class="w-full px-3 py-2 border border-slate-200 rounded-xl text-sm focus:outline-none bg-white focus:border-indigo-500">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">Password</label>
                    <input type="password" name="password" required placeholder="••••••••" class="w-full px-3 py-2 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-indigo-500">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-600 mb-2">Choose Your Campus Avatar</label>
                <input type="hidden" name="profile_pic" id="selected-avatar" value="avatar1.png">
                
                <div class="grid grid-cols-4 gap-3 bg-slate-50 p-3 rounded-2xl border border-slate-100">
                    <div onclick="selectAvatar('avatar1.png', this)" class="avatar-option cursor-pointer p-2 rounded-xl border-2 border-indigo-600 bg-white transition-all transform hover:scale-105 flex items-center justify-center">
                        <svg class="w-11 h-11 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 17.25v1.007a3 3 0 01-.879 2.122L7.5 21h9l-.621-.621A3 3 0 0115 18.257V17.25m6-12V15a2.25 2.25 0 01-2.25 2.25H5.25A2.25 2.25 0 013 15V5.25m18 0A2.25 2.25 0 0018.75 3H5.25A2.25 2.25 0 003 5.25m18 0V12a2.25 2.25 0 01-2.25 2.25H5.25A2.25 2.25 0 013 12V5.25" /></svg>
                    </div>
                    <div onclick="selectAvatar('avatar2.png', this)" class="avatar-option cursor-pointer p-2 rounded-xl border-2 border-transparent hover:border-slate-300 transition-all transform hover:scale-105 flex items-center justify-center">
                        <svg class="w-11 h-11 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.362 5.214A8.252 8.252 0 0 1 12 21 8.25 8.25 0 0 1 6.038 7.047 8.287 8.287 0 0 0 9 9.601a8.983 8.983 0 0 1 3.361-6.867 8.21 8.21 0 0 0 3 2.48Z" /><path stroke-linecap="round" stroke-linejoin="round" d="M12 18a3.75 3.75 0 0 0 .495-7.467 5.99 5.99 0 0 0-1.925 3.546 5.974 5.974 0 0 1-2.133-1A3.75 3.75 0 0 0 12 18Z" /></svg>
                    </div>
                    <div onclick="selectAvatar('avatar3.png', this)" class="avatar-option cursor-pointer p-2 rounded-xl border-2 border-transparent hover:border-slate-300 transition-all transform hover:scale-105 flex items-center justify-center">
                        <svg class="w-11 h-11 text-amber-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 6.75h6m-6 3h6m-3 3.75V16.5m-7.5-3c0-2.071 1.679-3.75 3.75-3.75h9.75c2.071 0 3.75 1.679 3.75 3.75V19.5a2.25 2.25 0 0 1-2.25 2.25H5.25A2.25 2.25 0 0 1 3 19.5v-5.75Z" /><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v3.75" /></svg>
                    </div>
                    <div onclick="selectAvatar('avatar4.png', this)" class="avatar-option cursor-pointer p-2 rounded-xl border-2 border-transparent hover:border-slate-300 transition-all transform hover:scale-105 flex items-center justify-center">
                        <svg class="w-11 h-11 text-rose-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.182 15.182a4.5 4.5 0 0 1-6.364 0M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0ZM9.75 9.75c0 .414-.168.75-.375.75S9 10.164 9 9.75s.168-.75.375-.75.375.336.375.75Zm-.375 0h.008v.015h-.008V9.75Zm5.625 0c0 .414-.168.75-.375.75s-.375-.336-.375-.75.168-.75.375-.75.375.336.375.75Zm-.375 0h.008v.015h-.008V9.75Z" /></svg>
                    </div>
                </div>
            </div>
            
            <div>
                <label class="block text-xs font-semibold text-slate-600 mb-2">Select Core Interests</label>
                <div class="grid grid-cols-2 gap-2 text-xs text-slate-700">
                    <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" name="interests" value="coding" class="rounded border-slate-300 text-indigo-600"> 💻 Coding</label>
                    <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" name="interests" value="going out" class="rounded border-slate-300 text-indigo-600"> 🍕 Going Out</label>
                    <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" name="interests" value="rides" class="rounded border-slate-300 text-indigo-600"> 🚗 Rides</label>
                    <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" name="interests" value="sports" class="rounded border-slate-300 text-indigo-600"> ⚽ Sports</label>
                </div>
            </div>
            <button type="submit" class="w-full py-2.5 bg-indigo-600 text-white rounded-xl text-sm font-medium hover:bg-indigo-700 transition">Complete Registration</button>
        </form>
    </div>
</div>

<script>
    function toggleForm(target) {
        const loginForm = document.getElementById('form-login');
        const signupForm = document.getElementById('form-signup');
        const tabLogin = document.getElementById('tab-login');
        const tabSignup = document.getElementById('tab-signup');
        if(target === 'login') {
            loginForm.classList.remove('hidden');
            signupForm.classList.add('hidden');
            tabLogin.className = "text-indigo-600 border-b-2 border-indigo-600 pb-3 -mb-3.5 focus:outline-none";
            tabSignup.className = "text-slate-400 hover:text-slate-600 pb-3 focus:outline-none";
        } else {
            signupForm.classList.remove('hidden');
            loginForm.classList.add('hidden');
            tabSignup.className = "text-indigo-600 border-b-2 border-indigo-600 pb-3 -mb-3.5 focus:outline-none";
            tabLogin.className = "text-slate-400 hover:text-slate-600 pb-3 focus:outline-none";
        }
    }
    function selectAvatar(filename, element) {
        document.getElementById('selected-avatar').value = filename;
        document.querySelectorAll('.avatar-option').forEach(opt => {
            opt.classList.remove('border-indigo-600', 'bg-white');
            opt.classList.add('border-transparent');
        });
        element.classList.remove('border-transparent');
        element.classList.add('border-indigo-600', 'bg-white');
    }
</script>
{% endblock %}
