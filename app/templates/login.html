{% extends 'base.html' %}
{% block content %}
<style>
    .apple-blur {
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
    }
    .apple-input {
        transition: border-color 0.25s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.25s cubic-bezier(0.25, 0.8, 0.25, 1), transform 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    .apple-input:focus {
        border-color: #0071e3 !important;
        box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.15) !important;
        transform: scale(0.995);
    }
    .apple-btn {
        transition: transform 0.2s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.2s ease;
    }
    .apple-btn:active {
        transform: scale(0.98);
    }
    .tab-transition {
        transition: color 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), border-color 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    @keyframes appleFadeIn {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .animate-apple-in {
        animation: appleFadeIn 0.4s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
    }
</style>

<div class="max-w-4xl mx-auto bg-neutral-50/80 border border-neutral-200/60 rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.04)] overflow-hidden grid grid-cols-1 md:grid-cols-2 min-h-[65vh] mt-12 apple-blur">
    
    <div class="bg-neutral-900 p-10 text-white flex flex-col justify-between relative overflow-hidden">
        <div class="absolute -top-24 -left-24 w-64 height-64 bg-neutral-800 rounded-full blur-3xl opacity-40 mix-blend-screen pointer-events-none"></div>
        
        <div class="relative z-10">
            <div class="w-7 h-7 bg-white/10 rounded-lg flex items-center justify-center border border-white/10 mb-8 backdrop-blur-md">
                <div class="w-2.5 h-2.5 bg-neutral-100 rounded-sm"></div>
            </div>
            <h2 class="text-3xl font-semibold tracking-tight leading-tight text-neutral-100 font-sans">
                Meet up.<br>Split costs.<br>Group up.
            </h2>
            <p class="text-neutral-400 text-[13px] leading-relaxed mt-5 font-normal max-w-xs">
                A closed-loop micro-network built precisely for coordinating turf bookings, sharing rides, and forming project squads across your campus ecosystem.
            </p>
        </div>
        
        <div class="text-[11px] font-medium tracking-wide text-neutral-500 uppercase font-sans tracking-widest relative z-10">
            &copy; 2026 CampusConnect
        </div>
    </div>

    <div class="p-10 flex flex-col justify-center bg-white">
        <div class="flex gap-6 mb-8 border-b border-neutral-100 pb-0 text-[13px] font-medium">
            <button onclick="toggleForm('login')" id="tab-login" class="tab-transition text-neutral-900 border-b-2 border-neutral-900 pb-3 -mb-[2px] focus:outline-none font-semibold">
                Sign In
            </button>
            <button onclick="toggleForm('signup')" id="tab-signup" class="tab-transition text-neutral-400 hover:text-neutral-600 pb-3 focus:outline-none">
                Create Account
            </button>
        </div>

        <form id="form-login" action="/login" method="POST" class="space-y-4 animate-apple-in">
            <input type="hidden" name="action" value="login">
            
            <div>
                <label class="block text-[11px] font-semibold text-neutral-500 tracking-wide uppercase mb-1.5">Personal Gmail ID</label>
                <input type="email" name="email" required placeholder="name@gmail.com" class="apple-input w-full px-3.5 py-2.5 bg-neutral-50 border border-neutral-200/80 rounded-xl text-[13px] placeholder-neutral-400 focus:bg-white focus:outline-none">
            </div>
            
            <div>
                <label class="block text-[11px] font-semibold text-neutral-500 tracking-wide uppercase mb-1.5">Password</label>
                <input type="password" name="password" required placeholder="••••••••" class="apple-input w-full px-3.5 py-2.5 bg-neutral-50 border border-neutral-200/80 rounded-xl text-[13px] placeholder-neutral-400 focus:bg-white focus:outline-none">
            </div>
            
            <button type="submit" class="apple-btn w-full py-2.5 bg-neutral-900 text-white rounded-xl text-[13px] font-medium hover:bg-neutral-800 focus:outline-none mt-2 shadow-sm shadow-neutral-900/5">
                Sign In
            </button>
        </form>

        <form id="form-signup" action="/login" method="POST" enctype="multipart/form-data" class="hidden space-y-4">
            <input type="hidden" name="action" value="signup">
            
            <div>
                <label class="block text-[11px] font-semibold text-neutral-500 tracking-wide uppercase mb-1.5">Full Name</label>
                <input type="text" name="name" required placeholder="Sidharth" class="apple-input w-full px-3.5 py-2.5 bg-neutral-50 border border-neutral-200/80 rounded-xl text-[13px] placeholder-neutral-400 focus:bg-white focus:outline-none">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[11px] font-semibold text-neutral-500 tracking-wide uppercase mb-1.5">Gmail ID</label>
                    <input type="email" name="email" required placeholder="name@gmail.com" class="apple-input w-full px-3.5 py-2.5 bg-neutral-50 border border-neutral-200/80 rounded-xl text-[13px] placeholder-neutral-400 focus:bg-white focus:outline-none">
                </div>
                <div>
                    <label class="block text-[11px] font-semibold text-neutral-500 tracking-wide uppercase mb-1.5">Roll Number</label>
                    <input type="text" name="roll_number" placeholder="AM.EN.U4CSE..." required class="apple-input w-full px-3.5 py-2.5 bg-neutral-50 border border-neutral-200/80 rounded-xl text-[13px] placeholder-neutral-400 focus:bg-white focus:outline-none">
                </div>
            </div>

            <div class="grid grid-cols-3 gap-3">
                <div>
                    <label class="block text-[11px] font-semibold text-neutral-500 tracking-wide uppercase mb-1.5">Age</label>
                    <input type="number" name="age" min="16" max="30" required placeholder="20" class="apple-input w-full px-3.5 py-2.5 bg-neutral-50 border border-neutral-200/80 rounded-xl text-[13px] placeholder-neutral-400 focus:bg-white focus:outline-none">
                </div>
                <div>
                    <label class="block text-[11px] font-semibold text-neutral-500 tracking-wide uppercase mb-1.5">Gender</label>
                    <div class="relative">
                        <select name="gender" required class="apple-input w-full px-3.5 py-2.5 bg-neutral-50 border border-neutral-200/80 rounded-xl text-[13px] focus:bg-white focus:outline-none appearance-none cursor-pointer text-neutral-800">
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-neutral-400">
                            <svg class="fill-current h-3 w-3" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                        </div>
                    </div>
                </div>
                <div>
                    <label class="block text-[11px] font-semibold text-neutral-500 tracking-wide uppercase mb-1.5">Password</label>
                    <input type="password" name="password" required placeholder="••••••••" class="apple-input w-full px-3.5 py-2.5 bg-neutral-50 border border-neutral-200/80 rounded-xl text-[13px] placeholder-neutral-400 focus:bg-white focus:outline-none">
                </div>
            </div>

            <div>
                <label class="block text-[11px] font-semibold text-neutral-500 tracking-wide uppercase mb-1.5">Avatar Picture <span class="text-neutral-400 font-normal lowercase">(optional)</span></label>
                <input type="file" name="profile_pic" accept="image/*" class="w-full text-[12px] text-neutral-500 file:mr-4 file:py-1.5 file:px-3 file:rounded-lg file:border file:border-neutral-200 file:text-[11px] file:font-medium file:bg-white file:text-neutral-700 hover:file:bg-neutral-50 file:cursor-pointer transition">
            </div>
            
            <div>
                <label class="block text-[11px] font-semibold text-neutral-500 tracking-wide uppercase mb-2.5">Select Core Interests</label>
                <div class="grid grid-cols-2 gap-3 text-[13px] text-neutral-700">
                    <label class="flex items-center gap-2.5 cursor-pointer select-none">
                        <input type="checkbox" name="interests" value="coding" class="rounded-md border-neutral-300 text-neutral-900 focus:ring-neutral-900 focus:ring-offset-0 w-4 h-4"> 
                        <span>💻 Coding / Hackathons</span>
                    </label>
                    <label class="flex items-center gap-2.5 cursor-pointer select-none">
                        <input type="checkbox" name="interests" value="going out" class="rounded-md border-neutral-300 text-neutral-900 focus:ring-neutral-900 focus:ring-offset-0 w-4 h-4"> 
                        <span>🍕 Going Out / Food</span>
                    </label>
                    <label class="flex items-center gap-2.5 cursor-pointer select-none">
                        <input type="checkbox" name="interests" value="rides" class="rounded-md border-neutral-300 text-neutral-900 focus:ring-neutral-900 focus:ring-offset-0 w-4 h-4"> 
                        <span>🚗 Joined Rides</span>
                    </label>
                    <label class="flex items-center gap-2.5 cursor-pointer select-none">
                        <input type="checkbox" name="interests" value="sports" class="rounded-md border-neutral-300 text-neutral-900 focus:ring-neutral-900 focus:ring-offset-0 w-4 h-4"> 
                        <span>⚽ Turf / Sports</span>
                    </label>
                </div>
            </div>

            <button type="submit" class="apple-btn w-full py-2.5 bg-neutral-900 text-white rounded-xl text-[13px] font-medium hover:bg-neutral-800 focus:outline-none mt-2 shadow-sm shadow-neutral-900/5">
                Complete Registration
            </button>
        </form>
    </div>
</div>

<script>
    function toggleForm(target) {
        const loginForm = document.getElementById('form-login');
        const signupForm = document.getElementById('form-signup');
        const tabLogin = document.getElementById('tab-login');
        const tabSignup = document.getElementById('tab-signup');

        if(target === 'login') {
            signupForm.classList.add('hidden');
            signupForm.classList.remove('animate-apple-in');
            
            loginForm.classList.remove('hidden');
            loginForm.classList.add('animate-apple-in');
            
            tabLogin.className = "tab-transition text-neutral-900 border-b-2 border-neutral-900 pb-3 -mb-[2px] focus:outline-none font-semibold";
            tabSignup.className = "tab-transition text-neutral-400 hover:text-neutral-600 pb-3 focus:outline-none";
        } else {
            loginForm.classList.add('hidden');
            loginForm.classList.remove('animate-apple-in');
            
            signupForm.classList.remove('hidden');
            signupForm.className = "space-y-4 animate-apple-in";
            
            tabSignup.className = "tab-transition text-neutral-900 border-b-2 border-neutral-900 pb-3 -mb-[2px] focus:outline-none font-semibold";
            tabLogin.className = "tab-transition text-neutral-400 hover:text-neutral-600 pb-3 focus:outline-none";
        }
    }
</script>
{% endblock %}
