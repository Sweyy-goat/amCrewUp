{% extends 'base.html' %}
{% block content %}
<div class="max-w-3xl mx-auto bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden flex flex-col h-[75vh]">
    <div class="bg-slate-900 p-4 text-white flex justify-between items-center">
        <div>
            <h2 class="font-bold text-base">{{ event.title }}</h2>
            <p class="text-xs text-slate-400">Live chat updates automatically until target session time expires.</p>
        </div>
        <a href="/dashboard" class="text-xs text-slate-300 hover:text-white px-2 py-1 bg-slate-800 rounded-lg">Exit Chat</a>
    </div>

    <div id="msg-container" class="flex-grow p-4 overflow-y-auto space-y-3 bg-slate-50">
        {% for message in messages %}
        <div class="flex items-start gap-2.5 {% if message.sender.id == current_user.id %}flex-row-reverse{% endif %}">
            <div class="flex flex-col max-w-[70%]">
                <span class="text-[10px] text-slate-400 mb-0.5 {% if message.sender.id == current_user.id %}text-right{% endif %}">
                    {{ message.sender.roll_number }}
                </span>
                <p class="p-3 text-sm rounded-2xl shadow-xs {% if message.sender.id == current_user.id %}bg-indigo-600 text-white rounded-tr-none{% else %}bg-white text-slate-800 border border-slate-200 rounded-tl-none{% endif %}">
                    {{ message.content }}
                </p>
            </div>
        </div>
        {% endfor %}
    </div>

    <div class="p-3 border-t border-slate-200 bg-white">
        <div class="flex gap-2">
            <input type="text" id="user-input" placeholder="Coordinate sync location, matching strategy..." class="flex-grow border border-slate-200 rounded-xl px-4 py-2 text-sm focus:outline-none focus:border-indigo-500">
            <button id="send-btn" class="px-4 py-2 bg-indigo-600 text-white font-medium rounded-xl text-sm hover:bg-indigo-700 transition">Send</button>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='../socket.io/socket.io.js') }}"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script>
    // Automatically capture your live deployment's domain structure
    const protocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
    const socketUrl = protocol + window.location.host;

    // Explicitly configure production handshake parameters
    const socket = io(socketUrl, {
        transports: ['websocket', 'polling'],
        upgrade: true,
        rememberUpgrade: true
    });

    const eventId = "{{ event.id }}";
    const currentRoll = "{{ current_user.roll_number }}";

    // Debugging verification log visible in browser console (Inspect Element)
    socket.on('connect', () => {
        console.log('Successfully synchronized with campus chat engine via WebSocket.');
        socket.emit('join', { event_id: eventId });
    });

    socket.on('connect_error', (error) => {
        console.error('WebSocket Handshake Failed:', error);
    });

    const sendBtn = document.getElementById('send-btn');
    const input = document.getElementById('user-input');
    const container = document.getElementById('msg-container');

    container.scrollTop = container.scrollHeight;

    function dispatchMessage() {
        if(input.value.trim() !== "") {
            socket.emit('text', { event_id: eventId, msg: input.value });
            input.value = "";
        }
    }

    sendBtn.addEventListener('click', dispatchMessage);
    input.addEventListener('keypress', (e) => { if(e.key === 'Enter') dispatchMessage(); });

    socket.on('message', (data) => {
        const isMe = data.user === currentRoll;
        const align = isMe ? 'flex-row-reverse' : '';
        const bg = isMe ? 'bg-indigo-600 text-white rounded-tr-none' : 'bg-white text-slate-800 border border-slate-200 rounded-tl-none';
        const txtAlign = isMe ? 'text-right' : '';
        
        const markup = `
            <div class="flex items-start gap-2.5 ${align}">
                <div class="flex flex-col max-w-[70%]">
                    <span class="text-[10px] text-slate-400 mb-0.5 ${txtAlign}">${data.user}</span>
                    <p class="p-3 text-sm rounded-2xl shadow-xs ${bg}">${data.msg}</p>
                </div>
            </div>`;
        container.insertAdjacentHTML('beforeend', markup);
        container.scrollTop = container.scrollHeight;
    });

    socket.on('status', (data) => {
        const statusMarkup = `<p class="text-center text-[11px] text-slate-400 italic my-2">${data.msg}</p>`;
        container.insertAdjacentHTML('beforeend', statusMarkup);
        container.scrollTop = container.scrollHeight;
    });
</script>
{% endblock %}
