<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="h-full flex flex-col justify-between">
    {% if current_user.is_authenticated %}
    <nav class="bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
        <a href="/dashboard" class="text-xl font-bold tracking-tight text-slate-900">Campus<span class="text-indigo-600">Connect.</span></a>
        <div class="flex items-center gap-4">
            <img src="{{ url_for('static', filename='uploads/' + current_user.profile_pic) }}" class="w-8 h-8 rounded-full border border-slate-300 object-cover">
            <span class="text-sm font-medium text-slate-600">{{ current_user.name }}</span>
            <a href="/logout" class="text-xs font-semibold px-3 py-2 bg-slate-100 text-slate-700 rounded-lg hover:bg-slate-200 transition">Logout</a>
        </div>
    </nav>
    {% endif %}

    <main class="flex-grow container mx-auto px-4 py-8 max-w-6xl">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
